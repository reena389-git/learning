# =============================================================================
# DATA CONTRACT TEMPLATE — v4
# =============================================================================
# Lives in: risk-warehouse/contracts/<capability>/<product_id>.yaml
# Source of truth: this YAML in Git.
#
# Changes from v3:
#   - change_policy: explicit numeric fields, no cryptic shorthand
#   - All lists in block style (one item per line with leading dash),
#     including single-element lists
#   - contract.policy UC tag removed (policy lives in YAML and rendered page)
# =============================================================================

product:
  # ---------------------------------------------------------------------------
  # Identity
  # ---------------------------------------------------------------------------
  product_id: collateralized_funding_view       # stable slug, never changes
  product_name: "Collateralized Funding View"   # display name, can evolve
  contract_version: 1.0.0
  contract_last_changed: 2026-05-13             # date of last CONTRACT change (NOT data refresh)
  status: active                                # draft | active | deprecated | sunset

  # ---------------------------------------------------------------------------
  # Classification — drives marketplace navigation and governance
  # ---------------------------------------------------------------------------
  capability: liquidity_funding_risk            # primary navigation axis
  archetype: derived                            # foundational | derived | consumer_aligned
  table_shape: materialized_view                # dim | fact | obt | lookup | view | materialized_view

  # ---------------------------------------------------------------------------
  # Producer — who builds this product
  # ---------------------------------------------------------------------------
  producer_app: null                            # null for cross-app products
  producer_domain: liquidity                    # credit_risk | market_risk | funding | liquidity | shared

  # ---------------------------------------------------------------------------
  # Ownership
  # ---------------------------------------------------------------------------
  business_owner: pg_liquidity_funding
  technical_owner: risk_data_platform
  steward_email: risk-data-collateralized-funding@td.com

# =============================================================================
# REFERENCES — all external cross-links in one place
# =============================================================================
references:
  contract_yaml_url: https://github.com/td/risk-warehouse/blob/main/contracts/liquidity_funding_risk/collateralized_funding_view.yaml
  confluence_product_page: https://td.atlassian.net/wiki/spaces/RISK/pages/.../collateralized-funding-view
  collibra_ref: LFR-CFV-001
  collibra_url: https://td.collibra.com/asset/LFR-CFV-001
  requirements_doc: https://td.atlassian.net/wiki/spaces/RISK/pages/.../cfv-intake
  change_request_tracking: https://td.atlassian.net/jira/projects/RISKDATA/board

# =============================================================================
# DESCRIPTION
# =============================================================================
description:
  business_description: |
    Daily view of liquidity buffer adjusted for collateral encumbrance.
    Joins LCR Buffer (Liquidity) with Collateral Exposure (CMOS) to give
    the funding desk a single view of unencumbered liquidity by currency
    and business date.

  column_descriptions:
    business_date: "Business date the view represents (T)"
    currency: "ISO currency code"
    hqla_amount: "Total HQLA from LCR Buffer, in currency"
    pledged_collateral_amount: "Collateral posted (encumbered), in currency"
    unencumbered_liquidity: "hqla_amount - pledged_collateral_amount"
    coverage_ratio: "unencumbered_liquidity / hqla_amount"

# =============================================================================
# GRAIN & DIMENSIONS
# =============================================================================
grain:
  grain_short: business_date+currency            # for UC tag, at-a-glance
  grain_description: |
    One row per business date per currency. Currencies present are those
    with non-zero HQLA or non-zero pledged collateral on that date.

dimensions:
  allowed:
    - business_date
    - currency
  blocked:
    - counterparty
    - book

# =============================================================================
# MEASURES
# =============================================================================
measures:
  - name: hqla_amount
    description: "Total HQLA"
    aggregation: additive
    safe_aggregation:
      - currency
    unit: native_currency

  - name: pledged_collateral_amount
    description: "Collateral posted (encumbered)"
    aggregation: additive
    safe_aggregation:
      - currency
    unit: native_currency

  - name: unencumbered_liquidity
    description: "HQLA minus pledged collateral"
    aggregation: additive
    safe_aggregation:
      - currency
    unit: native_currency

  - name: coverage_ratio
    description: "Unencumbered liquidity divided by HQLA"
    aggregation: non_additive_ratio
    unsafe_aggregation:
      - currency
    unit: ratio

# =============================================================================
# OPERATIONAL
# =============================================================================
sla:
  refresh_frequency: daily
  refresh_sla: daily_by_07:00_EST
  freshness_alert_after: 08:00_EST

change_policy:
  breaking_change_notice_days: 60
  additive_change_notice_days: 14
  deprecation_notice_days: 90
  notification_channel: risk-data-collateralized-funding@td.com

# =============================================================================
# CLASSIFICATION
# =============================================================================
classification:
  data_classification: confidential
  pii_present: false

# =============================================================================
# LINEAGE
# =============================================================================
lineage:
  upstream_products:
    - product_id: lcr_buffer
      version: ">=1.3"
      fields_used:
        - hqla_amount
        - currency
        - business_date
    - product_id: collateral_exposure
      version: ">=2.0"
      fields_used:
        - pledged_collateral_amount
        - currency
        - business_date

  upstream_tables:
    - risk_warehouse.products.lcr_buffer
    - risk_warehouse.products.collateral_exposure

# =============================================================================
# CONSUMERS — referenced, not embedded
# =============================================================================
consumer_registry:
  type: databricks_table
  location: risk_governance.consumer_registry
  filter: "product_id = 'collateralized_funding_view'"
  notes: |
    Subscriptions captured via catalog UI's Subscribe button.
    Observed consumers (from UC audit logs) queried separately at view time.

# =============================================================================
# QUALITY
# =============================================================================
quality:
  constraints:
    - name: amounts_non_negative
      check: hqla_amount >= 0 AND pledged_collateral_amount >= 0
    - name: pledged_not_exceed_hqla
      check: pledged_collateral_amount <= hqla_amount
      note: "If false, indicates over-pledging — escalate to liquidity team"
    - name: coverage_ratio_bounded
      check: coverage_ratio BETWEEN 0 AND 1

  tests:
    - name: row_count_within_band
      schedule: daily
      threshold: "±10% vs prior business day"
    - name: currency_coverage_matches_lcr
      schedule: daily
      description: "Every currency present in LCR Buffer must appear here"
    - name: coverage_ratio_within_expected_range
      schedule: daily
      threshold: "0.6 - 1.0 (alert if outside)"

# =============================================================================
# CHANGE HISTORY
# =============================================================================
change_history:
  - version: 1.0.0
    date: 2026-05-13
    type: initial
    summary: "Initial contracted release of Collateralized Funding View."
    impact: "n/a"
    approved_by:
      - pg_liquidity_funding
      - risk_data_platform
    notification_sent: 2026-05-13
    notification_channel: risk-data-collateralized-funding@td.com
    jira_ticket: RISKDATA-5001
